# Configuración MkDocs — menú lateral (sidebar)
# Uso: mkdocs serve  |  mkdocs build

site_name: Requerimientos Técnicos IdP — FAPI 2.0 (SFA Chile)
site_description: Análisis normativo FAPI 2.0 y soporte Keycloak para Finanzas Abiertas (CMF Chile)
site_url: https://davidortizalbornoz.github.io/idp-security-required/
repo_url: https://github.com/davidortizalbornoz/idp-security-required
repo_name: idp-security-required
docs_dir: docs

theme:
  name: material
  language: es
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - toc.follow
    - content.code.copy

markdown_extensions:
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4

plugins:
  - search

nav:
  - Documento: index.md
  - Resumen Ejecutivo · Matriz de Cumplimiento:
      - Matriz de cumplimiento: index.md#resumen-ejecutivo-matriz-de-cumplimiento
