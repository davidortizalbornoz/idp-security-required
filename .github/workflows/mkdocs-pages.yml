name: Publicar documentación (MkDocs + menú lateral)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar MkDocs Material
        run: pip install mkdocs mkdocs-material

      - name: Verificar que se genera index.html
        run: |
          mkdocs build
          test -f site/index.html || (echo "ERROR: falta site/index.html" && exit 1)

      - name: Desplegar en GitHub Pages
        run: mkdocs gh-deploy --force
